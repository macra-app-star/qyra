name: MACRA
options:
  bundleIdPrefix: co.tamras
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  MACRA:
    type: application
    platform: iOS
    sources:
      - path: MACRA
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.tamras.macra
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "MACRA uses the camera to scan barcodes and identify food for macro tracking."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MACRA uses the microphone for voice-based meal logging."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "MACRA reads your health data to display steps, active energy, and workout summaries on your dashboard."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "MACRA may write nutrition data to Apple Health."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "MACRA uses speech recognition to transcribe voice-based meal entries."
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: MACRA/Resources/MACRA.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.co.tamras.macra

  MACRATests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MACRATests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: MACRA
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.tamras.macra.tests
        GENERATE_INFOPLIST_FILE: true

  MACRAUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MACRAUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: MACRA
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.tamras.macra.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: MACRA
